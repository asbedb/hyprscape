[Settings]
language = en
folder = ~/wallpaper/
monitors = All
# wallpaper = set default wallpaper here
show_path_in_tooltip = True
# Use preferred backend below
backend = swww
fill = tile
sort = name
color = #241F31
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = 
number_of_columns = 3
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
stylesheet = ~/.config/waypaper/style.css
# you may need to symlink awww to swww 
awww_transition_type = any
awww_transition_step = 63
awww_transition_angle = 0
awww_transition_duration = 2
awww_transition_fps = 60
swww_transition_type = random
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60

